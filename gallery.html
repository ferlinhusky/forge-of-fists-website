<style>
:root {
  --parchment:#F5ECD7; --parchment-mid:#E8D5B0;
  --ink:#1A0F0A; --gold:#B8963E; --gold-l:#D4AF62; --gold-d:#8B6E2A;
  --radius:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--parchment);color:var(--ink);font-family:'Spectral',Georgia,serif;font-size:16px;line-height:1.75;overflow-x:hidden}
a{color:inherit;text-decoration:none}

/* ── Site nav ── */
.site-nav{position:sticky;top:0;z-index:900;background:var(--ink);border-bottom:1px solid rgba(184,150,62,.35);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:54px}
.nav-brand{font-family:'Metamorphous',cursive;color:var(--gold);font-size:.85rem;font-weight:700;letter-spacing:.04em;white-space:nowrap}
.nav-links{display:flex;list-style:none}
.nav-links a{display:block;font-family:'Metamorphous',serif;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(245,236,215,.55);padding:0 .85rem;height:54px;line-height:54px;transition:color .2s,background .2s}
.nav-links a:hover{color:var(--gold);background:rgba(184,150,62,.07)}
.nav-links .nav-active{color:var(--gold)}
.nav-links .nav-play{background:var(--gold);color:var(--ink)!important;margin-left:.5rem}
.nav-links .nav-play:hover{background:var(--gold-l)}
.nav-toggle{display:none;background:none;border:none;cursor:pointer;color:var(--gold);font-size:1.3rem;padding:.25rem}

/* ── Page header ── */
.page-header{text-align:center;padding:2.5rem 1rem 1.5rem;border-bottom:2px solid var(--gold-d)}
.page-header h1{font-family:'Metamorphous',serif;font-size:clamp(1.4rem,4vw,2.2rem);color:var(--ink)}
.page-header p{font-family:'IM Fell English',serif;font-style:italic;color:var(--gold-d);margin-top:.4rem;font-size:1rem}

/* ── Faction tab strip ── */
.faction-tabs{display:flex;flex-wrap:wrap;gap:.4rem;padding:.9rem 1.2rem;background:var(--parchment-mid);border-bottom:1px solid var(--gold-d);position:sticky;top:54px;z-index:99}
.faction-tab{font-family:'Metamorphous',serif;font-size:0.72rem;font-weight:700;letter-spacing:.07em;padding:.35rem .75rem;border-radius:3px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.faction-tab:hover{opacity:.85}

/* ── Main layout ── */
.gallery-main{max-width:1400px;margin:0 auto;padding:1.5rem 1rem 4rem}

/* ── Faction section ── */
.faction-section{margin-bottom:3rem;scroll-margin-top:90px}
.faction-header{font-family:'Metamorphous',serif;font-size:1.25rem;font-weight:700;letter-spacing:.1em;padding:.6rem 1rem;border-radius:var(--radius) var(--radius) 0 0;color:#fff;text-transform:uppercase}
.faction-body{background:rgba(255,255,255,.35);border:1px solid var(--gold-d);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:1rem}

/* ── Type group ── */
.type-group{margin-bottom:1.4rem}
.type-group:last-child{margin-bottom:0}
.type-label{font-family:'Metamorphous',serif;font-size:.7rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gold-d);margin-bottom:.55rem;padding-bottom:.25rem;border-bottom:1px solid var(--gold-l);opacity:.85}

/* ── Card grid ── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:.55rem}

/* ── Card thumbnail ── */
.card-thumb{display:flex;gap:.6rem;background:rgba(255,255,255,.55);border:1px solid var(--gold-d);border-radius:var(--radius);padding:.5rem;cursor:pointer;transition:all .15s;align-items:flex-start}
.card-thumb:hover{background:rgba(255,255,255,.85);box-shadow:0 2px 8px rgba(0,0,0,.15);transform:translateY(-1px)}
.card-thumb img{width:80px;min-width:80px;border-radius:3px;display:block;object-fit:cover;aspect-ratio:640/832}
.card-info{flex:1;min-width:0}
.card-name{font-family:'Metamorphous',serif;font-size:.78rem;font-weight:700;line-height:1.2;margin-bottom:.2rem;color:var(--ink)}
.card-meta{font-size:.65rem;color:#5a4030;margin-bottom:.28rem;font-family:'Spectral',serif}
.card-stats{display:flex;flex-wrap:wrap;gap:.2rem;margin-bottom:.28rem;align-items:center}
.stat-chip{font-size:.62rem;font-family:'Metamorphous',serif;font-weight:600;padding:.1rem .32rem;border-radius:2px;white-space:nowrap}
.stat-cost{background:var(--gold-d);color:#fff}
.stat-bounty{background:var(--parchment-mid);border:1px solid var(--gold-d);color:var(--ink)}
.stat-w{background:#b02020;color:#fff}
.stat-v{background:#1a6a1a;color:#fff}
.stat-b{background:#5a4a00;color:#fff}
.kw-list{display:flex;flex-wrap:wrap;gap:.18rem;margin-bottom:.28rem}
.kw{font-size:.58rem;font-family:'Metamorphous',serif;font-weight:700;letter-spacing:.05em;padding:.08rem .3rem;border-radius:2px;background:var(--ink);color:var(--gold-l)}
.ability-preview{font-size:.64rem;font-family:'IM Fell English',serif;font-style:italic;color:#3a2a15;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

/* ── Lightbox ── */
#lightbox{display:none;position:fixed;inset:0;background:rgba(10,5,0,.82);z-index:1000;align-items:center;justify-content:center;padding:1rem}
#lightbox.open{display:flex}
#lightbox-inner{background:var(--parchment);border:2px solid var(--gold-d);border-radius:8px;max-width:820px;width:100%;max-height:92vh;overflow:auto;display:flex;gap:0;position:relative}
#lb-close{position:absolute;top:.5rem;right:.7rem;font-size:1.5rem;cursor:pointer;color:var(--gold-d);font-family:'Metamorphous',serif;z-index:10;line-height:1;background:none;border:none}
#lb-close:hover{color:var(--ink)}
#lb-img-wrap{flex:0 0 auto;width:280px;padding:.8rem .8rem .8rem 1rem}
#lb-img-wrap img{width:100%;border-radius:4px;display:block}
#lb-content{flex:1;padding:1.2rem 1.2rem 1.2rem .4rem;display:flex;flex-direction:column;gap:.6rem;min-width:0}
#lb-name{font-family:'Metamorphous',serif;font-size:1.15rem;font-weight:700;line-height:1.2}
#lb-faction-type{font-size:.75rem;font-family:'Metamorphous',serif;letter-spacing:.06em;color:var(--gold-d)}
#lb-stats{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
#lb-keywords{display:flex;flex-wrap:wrap;gap:.25rem}
.lb-kw{font-size:.7rem;font-family:'Metamorphous',serif;font-weight:700;padding:.12rem .4rem;border-radius:3px;background:var(--ink);color:var(--gold-l)}
#lb-abilities{font-family:'IM Fell English',serif;font-size:.85rem;line-height:1.6;color:var(--ink)}
#lb-abilities .ab-line{padding:.25rem 0;border-bottom:1px dotted var(--gold-l)}
#lb-abilities .ab-line:last-child{border-bottom:none}
.lb-section-label{font-family:'Metamorphous',serif;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-d);margin-bottom:.2rem}

@media(max-width:768px){
  .nav-links{display:none;flex-direction:column;position:absolute;top:54px;left:0;right:0;background:var(--ink);border-bottom:1px solid rgba(184,150,62,.28);padding:.75rem 0}
  .nav-links.open{display:flex}
  .nav-links a{height:auto;line-height:1;padding:.75rem 1.5rem}
  .nav-toggle{display:block}
}
@media(max-width:600px){
  #lightbox-inner{flex-direction:column}
  #lb-img-wrap{width:100%;padding:.8rem 1rem .4rem}
  #lb-img-wrap img{max-width:220px;margin:0 auto}
  #lb-content{padding:.8rem 1rem 1rem}
  .card-grid{grid-template-columns:1fr}
}
</style>

// ── Rendering ────────────────────────────────────────────────────────────

function slug(s){ return s.toLowerCase().replace(/\s+/g,'-'); }

function renderStatChip(label, value, cls){
  if(value === null || value === undefined) return '';
  return `<span class="stat-chip ${cls}">${label} ${value}</span>`;
}

function buildThumb(card){
  const [name,faction,type,subtype,cost,wrath,vigor,bounty,kws,abs,img] = card;
  const imgPath = `images/cards/${img}`;

  let stats = '';
  if(cost !== null) stats += renderStatChip('',cost+' AP','stat-cost');
  if(wrath !== null) stats += renderStatChip('W',wrath,'stat-w');
  if(vigor !== null) stats += renderStatChip('V',vigor,'stat-v');
  if(bounty !== null && (type==='Monarch'||type==='Capitol'||type==='Character'||type==='Unit'||type==='Improvement'))
    stats += renderStatChip('★',bounty,'stat-b');

  const kwHtml = kws.map(k=>`<span class="kw">${k}</span>`).join('');
  const firstAb = abs.length ? abs[0] : '';
  const preview = firstAb.length > 110 ? firstAb.slice(0,108)+'…' : firstAb;

  return `<div class="card-thumb" data-name="${name.replace(/"/g,'&quot;')}" tabindex="0" role="button" aria-label="View ${name}">
    <img src="${imgPath}" alt="${name}" loading="lazy" onerror="this.style.opacity='.3'">
    <div class="card-info">
      <div class="card-name">${name}</div>
      <div class="card-meta">${type}${subtype&&subtype!=='—'?' · '+subtype:''}</div>
      <div class="card-stats">${stats}</div>
      ${kwHtml ? `<div class="kw-list">${kwHtml}</div>` : ''}
      ${preview ? `<div class="ability-preview">${preview}</div>` : ''}
    </div>
  </div>`;
}

function buildLightbox(card){
  const [name,faction,type,subtype,cost,wrath,vigor,bounty,kws,abs,img] = card;
  const fm = FACTION_META[faction];
  const imgPath = `images/cards/${img}`;

  let stats = '';
  if(cost !== null) stats += renderStatChip('Cost',cost+' AP','stat-cost');
  if(wrath !== null) stats += renderStatChip('Wrath',wrath,'stat-w');
  if(vigor !== null) stats += renderStatChip('Vigor',vigor,'stat-v');
  if(bounty !== null) stats += renderStatChip('Bounty',bounty,'stat-b');

  const kwHtml = kws.map(k=>`<span class="lb-kw">${k}</span>`).join('');
  const absHtml = abs.map(a=>`<div class="ab-line">${a}</div>`).join('');

  document.getElementById('lb-img').src = imgPath;
  document.getElementById('lb-img').alt = name;
  document.getElementById('lb-name').textContent = name;
  document.getElementById('lb-name').style.color = 'var(--ink)';
  document.getElementById('lb-faction-type').textContent =
    `${fm.label} · ${type}${subtype&&subtype!=='—'?' · '+subtype:''}`;
  document.getElementById('lb-stats').innerHTML = stats;
  document.getElementById('lb-keywords').innerHTML = kwHtml;
  document.getElementById('lb-abilities').innerHTML = absHtml ||
    '<span style="font-style:italic;opacity:.6">No abilities.</span>';
}

function render(){
  // Group by faction then type
  const byFaction = {};
  for(const f of Object.keys(FACTION_META)) byFaction[f] = {};
  for(const card of CARDS){
    const [,faction,type] = card;
    if(!byFaction[faction][type]) byFaction[faction][type] = [];
    byFaction[faction][type].push(card);
  }

  // Faction tabs
  const tabsEl = document.getElementById('faction-tabs');
  for(const [fk, fm] of Object.entries(FACTION_META)){
    const btn = document.createElement('button');
    btn.className = 'faction-tab';
    btn.innerHTML = `<img src="${fm.icon}" style="width:1.1rem;height:1.1rem;vertical-align:middle;margin-right:.3rem">${fm.label}`;
    btn.style.background = fm.color;
    btn.style.color = fk === 'creed' ? '#1a0f0a' : '#fff';
    btn.onclick = () => {
      document.getElementById('faction-'+fk).scrollIntoView({behavior:'smooth'});
    };
    tabsEl.appendChild(btn);
  }

  // Gallery sections
  const mainEl = document.getElementById('gallery-main');
  for(const [fk, fm] of Object.entries(FACTION_META)){
    const typeMap = byFaction[fk];
    if(!Object.keys(typeMap).length) continue;

    const section = document.createElement('section');
    section.className = 'faction-section';
    section.id = 'faction-'+fk;

    const headerTextColor = fk === 'creed' ? '#1a0f0a' : '#fff';
    section.innerHTML = `<div class="faction-header" style="background:${fm.color};color:${headerTextColor}"><img src="${fm.icon}" style="width:1.4rem;height:1.4rem;vertical-align:middle;margin-right:.5rem">${fm.label}</div>
      <div class="faction-body" style="background-color:${fm.light};border-color:${fm.color}"></div>`;
    const body = section.querySelector('.faction-body');

    for(const typeName of TYPE_ORDER){
      if(!typeMap[typeName]) continue;
      const cards = typeMap[typeName];
      const group = document.createElement('div');
      group.className = 'type-group';
      group.innerHTML = `<div class="type-label">${typeName}s (${cards.length})</div>
        <div class="card-grid">${cards.map(buildThumb).join('')}</div>`;
      body.appendChild(group);
    }
    mainEl.appendChild(section);
  }

  // Card thumb click handlers
  document.querySelectorAll('.card-thumb').forEach(el=>{
    const open = ()=>{
      const name = el.dataset.name;
      const card = CARDS.find(c=>c[0]===name);
      if(!card) return;
      buildLightbox(card);
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow='hidden';
    };
    el.addEventListener('click', open);
    el.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); open(); } });
  });
}

// Lightbox close
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow='';
}
document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lightbox').addEventListener('click', e=>{
  if(e.target===document.getElementById('lightbox')) closeLightbox();
});
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeLightbox(); });

render();
</script>
